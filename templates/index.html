<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="description" content="If you're hungry and unsure of where to go, this app randomly tells you where to go eat with a click of a button.">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Where Should I Go Eat?</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
  <link rel="manifest" href="/static/favicon/site.webmanifest">
</head>
<body>
  <div>
    <h1 class="desktop-title mobile-small-title mobile-large-title">Where Should I Go Eat</h1>
    <h2 class="desktop-subtitle mobile-small-subtitle mobile-large-subtitle">Undecided where you should go eat? Press a button to find out!</h2>
  </div>
  <div class="container">
    <div class="row">
      <div class="container">
        <div class="row button-row">
          <div class="col">
            <form action="/" method="POST">
              <button class="button" name="restaurant" type="submit" onclick="{{ restaurant }}">Chain Restaurant</button>
            </form>
          </div>
          <div class="col">
            <button class="button" name="google maps" type="submit" onclick=window.open("https://www.google.com/maps/search/?api=1&query=restaurants");>Local Restaurant</button>
            <p class="desktop-local-restaurant mobile-small-local-restaurant mobile-large-local-restaurant">Search Via Google Maps</p>
          </div>
          <div class="col">
            <button class="button" name="start-over" type="submit" onclick="location.href=location.href">Reset</button>
          </div>
          <p class="desktop-restaurant-result mobile-small-restaurant-result mobile-large-restaurant-result">You Should Go Eat At {{ restaurant }}</p>
        </div>
      </div>
    </div>
  </div>
  <div class="col desktop-social-media mobile-small-social-media mobile-large-social-media">
    <p>Created by Brittany Gates:<br><a href="https://www.brittanygates.me" title="My Blog" target="_blank">My Website</a> - <a href="https://brittbot.com/" title="Brittbot" target="_blank">Brittbot</a> - <a href="https://github.com/brittbot-bgates" title="My Github" target="_blank"><i class="bi bi-github"></i></a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>

</body>
</html>
