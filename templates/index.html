<body>
  <!--[if lte IE 9]>

  <div class="title">
    <h1>Where Should I Go Eat?</h1>
    <h2>Undecided where you should go eat? Press a button to find out!</h2>
  </div>

  <div class="container">
    <div class="row">
      <div class="col">
        <form action="/" method="POST">
          <button class="button" name="restaurant" type="submit" onclick="random_restaurant">Chain Restaurant</button>
        </form>
      </div>
      <div class="col">
        <button class="button" name="google maps" type="submit" onclick=window.open("https://www.google.com/maps/search/?api=1&query=restaurants");>Local Restaurant</button>
        <p class="local-restaurant">Search Via Google Maps</p>
      </div>
      <div class="col">
        <button class="button" name="start-over" type="submit" onclick="location.href=location.href">Reset</button>
      </div>
      <p class="restaurant-result">You Should Go Eat At {{ restaurant }}</p>
    </div>
  </div>
